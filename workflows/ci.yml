name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # Switch to `npm ci` once package-lock.json is committed.
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      # Integration tests require a CT-capable local validator; added as a
      # separate CI job once the validator setup is stabilized.
