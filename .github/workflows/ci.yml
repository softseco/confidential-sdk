name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No `cache: npm` yet — that needs a committed package-lock.json.
      # `.npmrc` (legacy-peer-deps) lets the kit-6 stack install cleanly.
      - run: npm install
      - run: npm test
      # typecheck + build are re-enabled once the full SDK surface compiles.
